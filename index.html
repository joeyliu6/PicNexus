<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <!-- 内联样式：基础布局 + 主题背景色 -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      html.dark-theme, html.dark-theme body {
        background-color: #0f172a;
        color: #f8fafc;
      }
      html.light-theme, html.light-theme body {
        background-color: #f1f5f9;
        color: #0f172a;
      }
      #app {
        width: 100%;
        height: 100%;
      }
    </style>
    <!-- 同步读取 localStorage 主题偏好，避免启动闪烁 -->
    <script>
      (function() {
        var saved = localStorage.getItem('picnexus-theme');
        var cls;
        if (saved === 'light-theme') {
          cls = 'light-theme';
        } else if (saved === 'dark-theme') {
          cls = 'dark-theme';
        } else {
          cls = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark-theme' : 'light-theme';
        }
        document.documentElement.classList.add(cls);
      })();
    </script>
    <link rel="stylesheet" href="/src/style.css" />
    <title>PicNexus</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
