<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <script src="/preload-theme.js"></script>
    <link rel="stylesheet" href="/preload.css" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <title>PicNexus</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 休眠恢复/网络抖动导致 ES 模块加载失败时的兜底：
         WebView2 在系统休眠恢复后会整页 reload，此时网络栈尚未就绪，
         Vite 的 ESM 模块 HTTP 请求会抛 ERR_NETWORK_CHANGED 导致白屏。
         策略：首次失败延迟 1.5s reload，再失败则显示降级错误页面。 -->
    <script src="/reload-guard.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
