name: Feature Request
description: 提一个新功能建议
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的解决方案
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
