name: Bug Report
description: 报告一个 bug
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: PicNexus 版本
      placeholder: v1.0.2
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 10
        - Windows 11
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: "设置页 → 关于与更新 → 打开日志目录，粘贴最后 50 行"
      render: text
