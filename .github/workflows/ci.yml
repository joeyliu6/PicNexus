name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Ubuntu system deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev build-essential curl wget file

      - name: Install dependencies
        run: npm ci

      - name: Build sidecar binaries for current platform
        shell: bash
        run: |
          set -e
          build_sidecar() {
            local dir=$1
            local win_script=$2
            pushd "sidecar/$dir" > /dev/null
            npm ci
            npm run build
            case "$RUNNER_OS" in
              Windows) npm run "$win_script" ;;
              macOS)   npm run pkg:mac-arm ;;
              Linux)   npm run pkg:linux ;;
            esac
            popd > /dev/null
          }
          build_sidecar qiyu-token-fetcher pkg:win
          build_sidecar nami-token-fetcher pkg:win:x64
          ls -la src-tauri/binaries/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Lint (ESLint + Stylelint)
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14
