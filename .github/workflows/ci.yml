name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_visual:
        description: 'Run Playwright visual regression screenshots'
        required: false
        default: false
        type: boolean
      run_e2e:
        description: 'Run Playwright web smoke E2E tests'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Ubuntu system deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev build-essential curl wget file

      - name: Install dependencies
        run: npm ci

      - name: Build sidecar binaries for current platform
        shell: bash
        run: |
          set -e
          build_sidecar() {
            local dir=$1
            local win_script=$2
            pushd "sidecar/$dir" > /dev/null
            npm ci
            npm run build
            case "$RUNNER_OS" in
              Windows) npm run "$win_script" ;;
              macOS)   npm run pkg:mac-arm ;;
              Linux)   npm run pkg:linux ;;
            esac
            popd > /dev/null
          }
          build_sidecar qiyu-token-fetcher pkg:win
          build_sidecar nami-token-fetcher pkg:win:x64
          ls -la src-tauri/binaries/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Lint (ESLint + Stylelint)
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  visual:
    name: Visual regression
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_visual == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload visual report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  e2e:
    name: Web smoke E2E
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E tests
        run: npm run test:e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
