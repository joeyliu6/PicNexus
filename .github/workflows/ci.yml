name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full visual regression run at 02:00 Asia/Shanghai.
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      run_visual:
        description: 'Run Playwright visual regression screenshots'
        required: false
        default: false
        type: boolean
      run_e2e:
        description: 'Run mocked Playwright E2E smoke tests'
        required: false
        default: false
        type: boolean
      run_tauri_e2e:
        description: 'Run real Tauri desktop E2E smoke tests on Windows'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Ubuntu system deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev build-essential curl wget file

      - name: Install dependencies
        run: npm ci

      - name: Build sidecar binaries for current platform
        shell: bash
        run: |
          set -e
          build_sidecar() {
            local dir=$1
            local win_script=$2
            pushd "sidecar/$dir" > /dev/null
            npm ci
            npm run build
            case "$RUNNER_OS" in
              Windows) npm run "$win_script" ;;
              macOS)   npm run pkg:mac-arm ;;
              Linux)   npm run pkg:linux ;;
            esac
            popd > /dev/null
          }
          build_sidecar qiyu-token-fetcher pkg:win
          build_sidecar nami-token-fetcher pkg:win:x64
          ls -la src-tauri/binaries/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

      - name: Type check
        run: npm run typecheck

      - name: Lint (ESLint + Stylelint)
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  obsidian-plugin:
    name: Obsidian plugin
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/picnexus/package-lock.json

      - name: Install plugin dependencies
        run: npm --prefix plugins/picnexus ci

      - name: Validate plugin release
        run: npm run ci:obsidian

      - name: Verify generated plugin bundle is committed
        run: git diff --exit-code -- plugins/picnexus/main.js

  visual-impact:
    name: Detect visual impact
    runs-on: ubuntu-latest

    outputs:
      visual: ${{ steps.filter.outputs.visual || steps.non_pr.outputs.visual || 'false' }}

    steps:
      - name: Detect changed UI and visual files
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            visual:
              - '.github/workflows/ci.yml'
              - 'playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tests/visual/**'
              - 'src/**/*.vue'
              - 'src/**/*.css'
              - 'src/**/*.scss'
              - 'src/assets/**'
              - 'src/components/**'
              - 'src/composables/**'
              - 'src/config/**'
              - 'src/constants/**'
              - 'src/main.ts'
              - 'src/style.css'
              - 'src/styles/**'
              - 'src/theme/**'
              - 'src/types/**'
              - 'src/uploadQueue.ts'
              - 'src/utils/**'

      - name: Mark non-PR events for explicit full visual runs
        id: non_pr
        if: github.event_name != 'pull_request'
        shell: bash
        run: echo "visual=true" >> "$GITHUB_OUTPUT"

  visual:
    name: Visual regression
    needs: visual-impact
    if: >-
      ${{
        (
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_visual == 'true') ||
          (github.event_name == 'pull_request' && needs.visual-impact.outputs.visual == 'true')
        )
      }}
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload visual report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    name: E2E smoke
    if: ${{ github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.run_e2e) }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-e2e-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  tauri-e2e:
    name: Tauri desktop E2E smoke
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_tauri_e2e == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build sidecar binaries for Windows
        shell: bash
        run: |
          set -e
          build_sidecar() {
            local dir=$1
            local win_script=$2
            pushd "sidecar/$dir" > /dev/null
            npm ci
            npm run build
            npm run "$win_script"
            popd > /dev/null
          }
          build_sidecar qiyu-token-fetcher pkg:win
          build_sidecar nami-token-fetcher pkg:win:x64
          ls -la src-tauri/binaries/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: tauri-e2e-windows

      - name: Install Tauri desktop E2E drivers
        shell: pwsh
        run: |
          cargo install tauri-driver --locked
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"

          $cargoBin = Join-Path $HOME ".cargo/bin"
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $PWD.Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Tauri desktop E2E smoke tests
        run: npm run test:tauri:e2e
