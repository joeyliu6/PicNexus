name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  web-smoke:
    name: Web smoke E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run web smoke E2E before release
        run: npm run test:e2e

      - name: Upload web smoke E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-release-smoke-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  release:
    needs: web-smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
          - platform: macos-latest
            target: 'x86_64-apple-darwin'
          - platform: ubuntu-latest
            target: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Ubuntu system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev build-essential curl wget file

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecar binaries for current target
        run: npm run setup:sidecars ${{ matrix.target && format('-- --target {0}', matrix.target) || '' }}

      - name: Lint before release
        run: npm run lint

      - name: Run unit tests before release
        run: npm run test:unit

      - name: Install Tauri desktop E2E drivers (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cargo install tauri-driver --locked
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"

          $cargoBin = Join-Path $HOME ".cargo/bin"
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $PWD.Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Tauri desktop E2E before release (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run test:tauri:e2e

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Prepare release body
        id: release_body
        shell: bash
        env:
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          {
            cat <<'PICNEXUS_DOWNLOAD_GUIDE'
          ## 推荐下载

          | 使用场景 | 推荐文件 |
          | --- | --- |
          | Windows 普通用户 | `PicNexus_*_x64-setup.exe` |
          | Windows 企业部署 / 批量安装 | `PicNexus_*_x64_*.msi` |
          | Windows 免安装便携版 | `PicNexus_*_windows_x64_portable.zip` |
          | macOS Apple Silicon | `PicNexus_*_aarch64.dmg` |
          | macOS Intel | `PicNexus_*_x64.dmg` |
          | Linux 通用运行 | `PicNexus_*_amd64.AppImage` |
          | Debian / Ubuntu | `PicNexus_*_amd64.deb` |
          | Fedora / RHEL / openSUSE | `PicNexus-*-1.x86_64.rpm` |
          | Obsidian 手动安装 | `picnexus-obsidian-*.zip` |

          `.sig` 和 `latest.json` 是签名校验 / 自动更新文件，普通手动安装通常不需要下载。

          `SHA256SUMS.txt` contains SHA-256 checksums for installers, portable archives, and updater JSON. Windows portable builds also include a same-name `.sha256` file.
          PICNEXUS_DOWNLOAD_GUIDE
            printf '\n'
            printf '%s\n' "$CHANGELOG"
          } > release-body.md
          {
            echo 'content<<PICNEXUS_RELEASE_BODY'
            cat release-body.md
            echo 'PICNEXUS_RELEASE_BODY'
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'PicNexus v__VERSION__'
          releaseBody: ${{ steps.release_body.outputs.content }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Package Windows portable ZIP
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: npm run package:portable:win

      - name: Smoke test portable ZIP (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "src-tauri/target/release/portable" -Filter "*_portable.zip" | Select-Object -First 1
          if (-not $zip) { throw "Portable ZIP not found" }

          $extractRoot = Join-Path $env:RUNNER_TEMP "picnexus-portable-smoke"
          if (Test-Path -LiteralPath $extractRoot) {
            $resolvedTemp = (Resolve-Path -LiteralPath $env:RUNNER_TEMP).Path
            $resolvedExtractRoot = (Resolve-Path -LiteralPath $extractRoot).Path
            if (-not $resolvedExtractRoot.StartsWith($resolvedTemp, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Refusing to remove path outside RUNNER_TEMP: $resolvedExtractRoot"
            }
            Remove-Item -LiteralPath $resolvedExtractRoot -Recurse -Force
          }

          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractRoot -Force

          $portableDir = Join-Path $extractRoot "PicNexus"
          $required = @(
            "PicNexus.exe",
            "bin/qiyu-token-fetcher.exe",
            "bin/nami-token-fetcher.exe",
            "icons/icon.png",
            "data/portable.json"
          )
          foreach ($item in $required) {
            $path = Join-Path $portableDir $item
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Portable ZIP missing required file: $item"
            }
          }

          & (Join-Path $portableDir "PicNexus.exe") --version

      - name: Upload Windows portable ZIP to draft release
        if: matrix.platform == 'windows-latest'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const portableDir = 'src-tauri/target/release/portable';
            const portableAssets = fs.readdirSync(portableDir)
              .filter(name => name.endsWith('_portable.zip') || name.endsWith('_portable.zip.sha256'))
              .sort((a, b) => Number(a.endsWith('.sha256')) - Number(b.endsWith('.sha256')));
            const assetName = portableAssets.find(name => name.endsWith('_portable.zip'));

            if (!assetName) {
              throw new Error(`No portable ZIP found in ${portableDir}`);
            }

            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100,
            });

            let release = releases.find(r => r.tag_name === tag);
            if (!release) {
              release = releases.find(r => r.draft && r.tag_name.startsWith('untagged-'));
              if (release) {
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  tag_name: tag,
                });
              }
            }

            if (!release) {
              throw new Error(`No draft release found for tag ${tag}`);
            }

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: release.id,
              per_page: 100,
            });
            for (const portableAssetName of portableAssets) {
              const existing = assets.find(asset => asset.name === portableAssetName);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existing.id,
                });
              }

              const assetPath = path.join(portableDir, portableAssetName);
              const data = fs.readFileSync(assetPath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: portableAssetName,
                data,
                headers: {
                  'content-type': portableAssetName.endsWith('.sha256') ? 'text/plain' : 'application/zip',
                  'content-length': data.length,
                },
              });

              console.log(`Uploaded portable asset: ${portableAssetName}`);
            }

      # Tier 3 B: 安装包冒烟 — 静默装 MSI + 启动 15 秒探活，macOS 跳过
      - name: Smoke test installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { throw "MSI not found" }
          Write-Host "Installing: $($msi.FullName)"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$($msi.FullName)`"", "/quiet", "/norestart" -Wait

          $exe = "C:\Program Files\PicNexus\PicNexus.exe"
          if (-not (Test-Path $exe)) { throw "Binary not found after install: $exe" }

          Write-Host "Launching app..."
          $proc = Start-Process $exe -PassThru
          Start-Sleep -Seconds 15

          if ($proc.HasExited) {
            throw "App exited prematurely with code $($proc.ExitCode)"
          }

          Write-Host "App running OK, killing..."
          Stop-Process -Id $proc.Id -Force

      - name: Smoke test AppImage (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then echo "AppImage not found"; exit 1; fi
          chmod +x "$APPIMAGE"

          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum "$APPIMAGE" &
          APP_PID=$!
          sleep 15

          if ! kill -0 $APP_PID 2>/dev/null; then
            echo "App exited prematurely"
            exit 1
          fi

          echo "App running OK, killing..."
          kill $APP_PID

  obsidian-plugin:
    needs: release
    permissions:
      contents: write
    uses: ./.github/workflows/release-obsidian-plugin.yml
    with:
      desktop_tag: ${{ github.ref_name }}
      target_repo: ${{ vars.OBSIDIAN_PLUGIN_REPOSITORY || 'joeyliu6/picnexus-obsidian' }}
    secrets:
      release_token: ${{ secrets.OBSIDIAN_PLUGIN_RELEASE_TOKEN }}

  # Tier 3 D: desktop and plugin assets are ready before final checksums and checklist
  release-checklist:
    needs: [release, obsidian-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SHA256SUMS for draft release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const crypto = require('crypto');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const checksumAssetName = 'SHA256SUMS.txt';
            const checksumTargetPattern = /\.(msi|exe|dmg|appimage|deb|rpm|zip|json)$/i;

            const { data: releases } = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100,
            });

            let release = releases.find(r => r.tag_name === tag);
            if (!release) {
              release = releases.find(r => r.draft && r.tag_name.startsWith('untagged-'));
              if (release) {
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  tag_name: tag,
                });
              }
            }

            if (!release) {
              throw new Error(`No draft release found for tag ${tag}`);
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.id,
              per_page: 100,
            });
            const checksumTargets = assets
              .filter(asset => asset.name !== checksumAssetName)
              .filter(asset => !asset.name.endsWith('.sha256'))
              .filter(asset => checksumTargetPattern.test(asset.name))
              .sort((a, b) => a.name.localeCompare(b.name));

            if (checksumTargets.length === 0) {
              throw new Error('No release assets found for SHA256SUMS.txt');
            }

            const lines = [];
            for (const asset of checksumTargets) {
              const response = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
                owner,
                repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' },
              });
              const buffer = Buffer.isBuffer(response.data)
                ? response.data
                : Buffer.from(response.data instanceof ArrayBuffer ? new Uint8Array(response.data) : response.data);
              const hash = crypto.createHash('sha256').update(buffer).digest('hex');
              lines.push(`${hash}  ${asset.name}`);
            }

            const existingChecksum = assets.find(asset => asset.name === checksumAssetName);
            if (existingChecksum) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingChecksum.id,
              });
            }

            const data = Buffer.from(`${lines.join('\n')}\n`, 'utf8');
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: checksumAssetName,
              data,
              headers: {
                'content-type': 'text/plain',
                'content-length': data.length,
              },
            });

            console.log(`Uploaded ${checksumAssetName} for ${checksumTargets.length} assets`);

      - name: Fix draft release tag and append checklist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const checklist = fs.readFileSync('.github/RELEASE_CHECKLIST.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');

            // 获取所有 release（包括 draft）
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // 先尝试找正确 tag 的 release
            let release = releases.find(r => r.tag_name === tag);

            // 如果没找到，找最新的 draft release（可能是 untagged-xxx）
            if (!release) {
              release = releases.find(r => r.draft && r.tag_name.startsWith('untagged-'));
              if (release) {
                console.log(`Found untagged draft release: ${release.tag_name}, fixing to ${tag}`);
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  tag_name: tag,
                });
                console.log(`✅ Fixed tag_name to ${tag}`);
              } else {
                throw new Error(`No draft release found for tag ${tag}`);
              }
            }

            // 追加 checklist
            const newBody = (release.body || '') + '\n\n---\n\n' + checklist;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: newBody,
            });
            console.log('✅ Appended release checklist');
