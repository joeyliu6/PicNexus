name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
          - platform: macos-latest
            target: 'x86_64-apple-darwin'
          - platform: ubuntu-latest
            target: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Ubuntu system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev build-essential curl wget file

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecar binaries for current target
        shell: bash
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          set -e
          build_sidecar() {
            local dir=$1
            local win_script=$2
            pushd "sidecar/$dir" > /dev/null
            npm ci
            npm run build
            case "$RUNNER_OS" in
              Windows)
                npm run "$win_script"
                ;;
              macOS)
                if [[ "$MATRIX_TARGET" == "aarch64-apple-darwin" ]]; then
                  npm run pkg:mac-arm
                else
                  npm run pkg:mac
                fi
                ;;
              Linux)
                npm run pkg:linux
                ;;
            esac
            popd > /dev/null
          }
          build_sidecar qiyu-token-fetcher pkg:win
          build_sidecar nami-token-fetcher pkg:win:x64
          ls -la src-tauri/binaries/

      - name: Lint before release
        run: npm run lint

      - name: Run tests before release
        run: npm run test:run

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'PicNexus v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.content }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # Tier 3 B: 安装包冒烟 — 静默装 MSI + 启动 15 秒探活，macOS 跳过
      - name: Smoke test installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { throw "MSI not found" }
          Write-Host "Installing: $($msi.FullName)"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$($msi.FullName)`"", "/quiet", "/norestart" -Wait

          $exe = "C:\Program Files\PicNexus\PicNexus.exe"
          if (-not (Test-Path $exe)) { throw "Binary not found after install: $exe" }

          Write-Host "Launching app..."
          $proc = Start-Process $exe -PassThru
          Start-Sleep -Seconds 15

          if ($proc.HasExited) {
            throw "App exited prematurely with code $($proc.ExitCode)"
          }

          Write-Host "App running OK, killing..."
          Stop-Process -Id $proc.Id -Force

      - name: Smoke test AppImage (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then echo "AppImage not found"; exit 1; fi
          chmod +x "$APPIMAGE"

          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum "$APPIMAGE" &
          APP_PID=$!
          sleep 15

          if ! kill -0 $APP_PID 2>/dev/null; then
            echo "App exited prematurely"
            exit 1
          fi

          echo "App running OK, killing..."
          kill $APP_PID

  # Tier 3 D: matrix 全绿后把手动回归清单追加到 draft release body
  release-checklist:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix draft release tag and append checklist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const checklist = fs.readFileSync('.github/RELEASE_CHECKLIST.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');

            // 获取所有 release（包括 draft）
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // 先尝试找正确 tag 的 release
            let release = releases.find(r => r.tag_name === tag);

            // 如果没找到，找最新的 draft release（可能是 untagged-xxx）
            if (!release) {
              release = releases.find(r => r.draft && r.tag_name.startsWith('untagged-'));
              if (release) {
                console.log(`Found untagged draft release: ${release.tag_name}, fixing to ${tag}`);
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  tag_name: tag,
                });
                console.log(`✅ Fixed tag_name to ${tag}`);
              } else {
                throw new Error(`No draft release found for tag ${tag}`);
              }
            }

            // 追加 checklist
            const newBody = (release.body || '') + '\n\n---\n\n' + checklist;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: newBody,
            });
            console.log('✅ Appended release checklist');
